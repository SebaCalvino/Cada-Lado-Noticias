name: Pipeline backup

# Fires at :07, :22, :37, :52 every hour — offset from Vercel's :00, :15, :30, :45.
# If Vercel cron is delayed or fails, this catches up within 7-8 minutes.
# On public repos GitHub Actions Linux minutes are free and unlimited.

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:   # manual trigger from GitHub UI

env:
  SITE_URL: https://cada-lado-noticias.vercel.app

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Ingest (triggers cluster via waitUntil)
        run: |
          echo "$(date -u '+%H:%M UTC') — triggering ingest..."
          curl -sf -X POST "$SITE_URL/api/cron/pipeline" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" || echo "Non-fatal: ingest call failed"

      - name: Wait for cluster phase (~2.5 min)
        run: sleep 150

      - name: Synthesize safety net
        # Catches any clusters with synthesis=null that the waitUntil chain missed
        # (Vercel killed the function early, cold start delay, race condition, etc.)
        run: |
          echo "$(date -u '+%H:%M UTC') — synthesize safety net..."
          curl -sf -X POST "$SITE_URL/api/pipeline/synthesize" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" || echo "Non-fatal: synthesize call failed"

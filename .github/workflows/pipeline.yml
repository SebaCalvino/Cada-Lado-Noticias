name: Pipeline automático

on:
  # ── Dispara tras cada push a main (= cada deploy a Vercel) ──────────────
  push:
    branches: [main]

  # ── Backup diario por si el cron de Vercel falla ────────────────────────
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC, staggered respecto a la hora en punto

  # ── Manual desde GitHub si se necesita ──────────────────────────────────
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      # En push: esperar a que Vercel termine de deployar antes de llamar
      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: |
          echo "Esperando que Vercel termine el deploy (~3 min)..."
          sleep 180

      - name: Trigger scraping pipeline
        run: |
          echo "Disparando pipeline — $(date -u '+%Y-%m-%d %H:%M UTC') [trigger: ${{ github.event_name }}]"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600 \
            "${{ secrets.APP_URL }}/api/cron/pipeline")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Pipeline falló con status $HTTP_STATUS"
            exit 1
          fi

          echo "Pipeline completado"

name: Pipeline — backup diario

# Con Vercel Pro el cron oficial (vercel.json) corre cada hora.
# Este workflow es sólo un safety-net: si Vercel falla durante un día
# entero, GitHub Actions dispara el pipeline una vez a las 03:30 UTC.

on:
  schedule:
    # Cada día a las 03:30 UTC — staggered respecto a la hora en punto de Vercel
    - cron: '30 3 * * *'
  workflow_dispatch:
    # También disparable manualmente desde GitHub Actions

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Trigger scraping pipeline (backup)
        run: |
          echo "Backup pipeline — $(date -u '+%Y-%m-%d %H:%M UTC')"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600 \
            "${{ secrets.APP_URL }}/api/cron/pipeline")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Pipeline falló con status $HTTP_STATUS"
            exit 1
          fi

          echo "Pipeline completado"

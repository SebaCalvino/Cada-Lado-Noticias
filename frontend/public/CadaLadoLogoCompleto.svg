<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <style>
      .brand { font-family: 'Georgia', serif; font-weight: 700; fill: #0052CC; }
      .sub   { font-family: 'Arial', sans-serif; font-weight: 400; fill: #0052CC; letter-spacing: 8px; }
    </style>
  </defs>

  <!-- CADA -->
  <text x="10" y="80" class="brand" font-size="72">CADA</text>


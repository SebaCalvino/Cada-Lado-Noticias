  <!-- LADO -->
  <text x="222" y="80" class="brand" font-size="72">LADO</text>

  <!-- NOTICIAS subtitle -->
  <text x="214" y="108" class="sub" font-size="13" text-anchor="middle">NOTICIAS</text>
</svg>

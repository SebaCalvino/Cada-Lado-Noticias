<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      .letters { font-family: 'Georgia', serif; font-weight: 700; fill: #0052CC; }
    </style>
  </defs>

  <!-- Outer circle -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#0052CC" stroke-width="5"/>

  <!-- Sweep arc (bottom, thicker — like in the logo) -->
  <path d="M 14 78 A 54 54 0 0 0 106 78" fill="none" stroke="#0052CC" stroke-width="8" stroke-linecap="round"/>

  <!-- CL letters -->
  <text x="60" y="72" class="letters" font-size="46" text-anchor="middle">CL</text>
</svg>

version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadalado}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadalado}
      POSTGRES_DB: ${POSTGRES_DB:-cadalado}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadalado}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cadalado}:${POSTGRES_PASSWORD:-cadalado}@db:5432/${POSTGRES_DB:-cadalado}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","https://${DOMAIN:-localhost}"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
